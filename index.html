            </ul>
            <div class="burger" id="burger">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>


<div class="lang-hybrid" id="lang-selector">
    <button class="hybrid-btn active" data-lang="en">
        <span class="br">[</span><span class="val">EN</span><span class="br">]</span>
        <span class="glitch-layer">EN</span>
    </button>
    <span class="hybrid-sep">//</span>
    <button class="hybrid-btn" data-lang="hu">
        <span class="br">[</span><span class="val">HU</span><span class="br">]</span>
            <span class="glitch-layer">HU</span>
    </button>
</div>



</div>

    <section id="about" class="about_section">
        <div class="about_inner">

            <div class="about_text">
                <h1 data-en="// About me" data-hu="// Rólam"></h1>
                <p data-en="I'm a computer science student at Eszterházy Károly Catholic University,
                    fluent in English and Hungarian. My main focus is backend development
                    and cyber security." 
                    data-hu="Programtervező informatikus szakon tanulok az Eszterházy Károly Katolikus Egyetemen, folyékonyan beszélek angolul és magyarul. A fő érdeklődési területem a backend development és a kiberbiztonság. ">
                </p>
            </div>

            <div class="skills_block">
                <h1 data-en="// Skills" data-hu="// Készségek"></h1>
                <div class="skills-grid">
                    <div class="skill-card" >C#</div>
                    <div class="skill-card">Python</div>
                    <div class="skill-card">Java</div>
                    <div class="skill-card">HTML</div>
                    <div class="skill-card">CSS</div>
                    <div class="skill-card">SQL</div>
                    <div class="skill-card">Git</div>
                    <div class="skill-card">GitHub</div>
                    <div class="skill-card">Docker</div>
                    <div class="skill-card" data-en="Networking" data-hu="Hálózati ismeretek"></div>
                    <div class="skill-card" data-en="Data Analysis" data-hu="Adatelemzés"></div>
                    <div class="skill-card" data-en="AI" data-hu="MI"></div>
                    <div class="skill-card">Agile/Scrum</div>
                    <div class="skill-card" data-en="Test-Driven Development" data-hu="Tesztvezérelt fejlesztés"></div>
                    <div class="skill-card" data-en="Clean Code principles" data-hu="Clean Code elvek"></div>
                </div>
            </div>

        </div>
    </section>

    <section id="projects" class="project_section">
        <h1 data-en="// Projects" data-hu="// Projektek"></h1>
        <div class="projects-grid">

            <div class="project-card" data-project="0">
                <div class="project-card-thumb">
                    <img src="pictures/grpc.jpg" alt="gRPC" height="130%" width="100%"/>
                    <span class="play-icon">▶</span>
                </div>
                <div class="project-card-info">
                    <h2 data-en="gRPC Service" data-hu="gRPC Szolgáltatás"></h2>
                    <p data-en="Secure remote procedure calls" data-hu="Biztonságos remote procedure call-ok"></p>
                </div>
            </div>

            <!--
            <div class="project-card" data-project="1">
                <div class="project-card-thumb">
                    <span class="play-icon">▶</span>
                </div>
                <div class="project-card-info">
                    <h2 data-en="Retro Console" data-hu="Retró Konzol"></h2>
                    <p data-en="A retro futuristic command console" data-hu="Egy retro futurisztikus kommand konzol"></p>
                </div>
            </div>
        -->

            <div class="project-card" data-project="1">
                <div class="project-card-thumb">
                    <span class="play-icon"></span>
                </div>
                <div class="project-card-info">
                    <h2 data-en="Portfolio website" data-hu="Portfólió weboldal"></h2>
                    <p data-en="Personal portfolio website" data-hu="Személyes portfólió weboldal"></p>
                </div>
            </div>

        </div>
    </section>

    <div id="projectModal" class="project-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="project-modal-backdrop"></div>
        <div class="project-modal-box">

            <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>

            <div class="modal-video-wrap">
                <video id="modalVideo" autoplay muted loop playsinline>
                    <source id="modalVideoSrc" src="" type="video/mp4" />
                    Your browser does not support the video tag.
                </video>
                <div class="video-placeholder" id="videoPlaceholder">
                    <span></span>
                </div>
            </div>

            <div class="modal-description">
                <h2 id="modalTitle" class="modal-title"></h2>

                <div class="modal-modules">
                    <div class="modal-module">
                        <h3 class="module-label">Overview</h3>
                        <p id="modalOverview" class="module-text"></p>
                    </div>
                    <div class="modal-module">
                        <h3 class="module-label">Tech Stack</h3>
                        <div id="modalTechStack" class="tech-tags"></div>
                    </div>
                    <div class="modal-module">
                        <h3 class="module-label">Highlights</h3>
                        <ul id="modalHighlights" class="highlights-list"></ul>
                    </div>
                    <div class="modal-module">
                        <h3 class="module-label">Links</h3>
                        <div id="modalLinks" class="modal-links"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
